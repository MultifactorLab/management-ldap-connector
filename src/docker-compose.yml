version: '3.8'

services:
  ldap-connector:
    image: ${DOCKER_REGISTRY-}mgm-ldap-connector
    container_name: mgm-ldap-connector
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      LITEDB__PATH: /data/storage.db
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ldap-connector-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v2/health/live"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3

volumes:
  ldap-connector-data: